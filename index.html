<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Gradient Generter</title>
    <style>
        body {
            background: linear-gradient(to right, rgb(64, 19, 19), rgb(251, 0, 0));
            color: white;
            font-family: 'Segoe UI';
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        div button {
            border: none;
            padding: 21px 35px;
            font-size: 1.15rem;
            margin: 0 20px;
            border-radius: 31px;
        }

        #mybtn {
            background-color: #401313;
            color: rgb(255, 255, 255);
        }

        #mybtn2 {
            background-color: #fb0000;
            color: rgb(255, 255, 255);
        }

        section {
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            width: 25rem;
            height: 13rem;
            padding: 25px;
            border: 2px;
            background: linear-gradient(89deg, #9591914d, #95919138);
            border-radius: 20px;
            box-shadow: 12px 17px 14px 3px #000000;
        }

        @media (max-width:600px) {
            section {
                width: 23rem;
                height: 13rem;
            }

            div button {
                margin: 0px 5px;
            }

            h2 {
                margin: 0;
            }
        }

        .copycode {
            position: relative;
            margin-left: 20px;
            background: rgb(255 255 255 / 28%);
            padding: 10px 20px;
            border-left: 5px solid white;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            color: #000000;
            font-weight: 400;
            overflow: scroll;

        }

        h2 {
            color: rgb(239, 236, 236);
            font-family: math;
        }
    </style>
</head>

<body>
    <section>
        <div>
            <button id="mybtn">#12120b</button>
            <button id="mybtn2">#fbf200</button>
        </div>
        <h2>Copy Code</h2>
        <div class="copycode">
            background: linear-gradient(to right,rgb(64, 19, 19),rgb(251, 0, 0));
        </div>
    </section>

    <script>

        let btn = document.getElementById('mybtn');
        let btn2 = document.getElementById('mybtn2');
        let ChangeCode = document.querySelector(".copycode");



        function RandomColor() {
            let hex = "0123456789abcdef";
            let color = "#";
            for (let i = 0; i < 6; i++) {
                color += hex[Math.floor(Math.random() * 16)];

            }
            return color;
        }

        function hexTorgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return `rgb(${r},${g},${b})`;
        }

        let color1 = "#401313";
        let color2 = "#fb0000";

        btn.addEventListener("click", () => {
            color1 = RandomColor();
            btn.style.background = color1;
            btn.textContent = color1;
            updateGradient();
        })
        btn2.addEventListener("click", () => {
            color2 = RandomColor();
            btn2.style.background = color2;

            btn2.textContent = color2;
            updateGradient();

        })
        function updateGradient() {
            ChangeCode.textContent = `background: linear-gradient(to right,${hexTorgb(color1)},${hexTorgb(color2)});`;

            document.body.style.background = `linear-gradient(to right,${color1},${color2})`;
        }






    </script>
</body>

</html>
